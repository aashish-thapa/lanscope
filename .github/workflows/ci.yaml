---
name: CI
on:
  pull_request:
  push:
    branches:
      - "*"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy rustfmt

      # Note: the `ebpf` feature needs nightly + bpf-linker and the `ml` feature
      # pulls ONNX Runtime, so CI lints/tests the default (stable) feature set.
      - name: Linting
        run: |
          cargo clippy --workspace -- -D warnings
          cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace

      - name: Build
        run: cargo build --release
